<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Workout Tracker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:white;
padding:15px;
}

header{
text-align:center;
margin-bottom:20px;
}

h1{
font-size:28px;
}

.day{
margin-bottom:20px;
background:#1f2937;
border-radius:12px;
overflow:hidden;
}

.day-header{
padding:15px;
font-size:20px;
font-weight:bold;
background:#2563eb;
cursor:pointer;
}

.day-content{
display:none;
padding:15px;
}

.exercise{
display:flex;
gap:15px;
margin-bottom:20px;
padding-bottom:15px;
border-bottom:1px solid #374151;
}

.exercise img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

.exercise-info{
flex:1;
}

.exercise-info h3{
margin-bottom:8px;
}

.exercise-info p{
margin-bottom:5px;
}

.exercise-info ul{
margin-left:20px;
margin-top:5px;
}

.checkbox{
margin-top:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#10b981;
color:white;
font-weight:bold;
}

.timer{
position:fixed;
bottom:20px;
right:20px;
background:#2563eb;
padding:15px;
border-radius:12px;
}

.progress{
background:#1f2937;
padding:15px;
margin-bottom:20px;
border-radius:12px;
text-align:center;
}

@media(max-width:768px){

.exercise{
flex-direction:column;
}

.exercise img{
width:100%;
height:auto;
}

}

</style>
</head>
<body>

<header>
<h1>💪 Workout Plan</h1>
<p>Build Muscle + Lose Belly Fat</p>
</header>

<div class="progress">
<h2>Weekly Progress</h2>
<p id="progressText">0% Completed</p>
</div>

<div id="workoutContainer"></div>

<div class="timer">
<button onclick="startTimer(60)">60s Rest</button>
</div>

<script>

let totalExercises = 0;
let completedExercises = 0;

fetch('workout.json')
.then(res=>res.json())
.then(data=>{

const container=document.getElementById('workoutContainer');

data.days.forEach(day=>{

let dayDiv=document.createElement('div');
dayDiv.className='day';

let header=document.createElement('div');
header.className='day-header';
header.innerText=day.day;

let content=document.createElement('div');
content.className='day-content';

header.onclick=()=>{
content.style.display=
content.style.display==='block'
?'none':'block';
};

day.exercises.forEach(ex=>{

totalExercises++;

let card=document.createElement('div');
card.className='exercise';

card.innerHTML=`

<img src="${ex.gif}" alt="${ex.name}">

<div class="exercise-info">

<h3>${ex.name}</h3>

<p><b>Sets:</b> ${ex.sets}</p>
<p><b>Reps:</b> ${ex.reps}</p>

<ul>
${ex.tips.map(t=>`<li>${t}</li>`).join('')}
</ul>

<div class="checkbox">
<input type="checkbox"
class="exerciseCheck">
Completed
</div>

</div>
`;

content.appendChild(card);

});

dayDiv.appendChild(header);
dayDiv.appendChild(content);

container.appendChild(dayDiv);

});

document
.querySelectorAll('.exerciseCheck')
.forEach(box=>{

box.addEventListener('change',()=>{

completedExercises=
document.querySelectorAll('.exerciseCheck:checked').length;

let percent=Math.round(
(completedExercises/totalExercises)*100
);

document.getElementById('progressText')
.innerText=percent+"% Completed";

localStorage.setItem(
'workoutProgress',
completedExercises
);

});

});

});

function startTimer(seconds){

let remaining=seconds;

let interval=setInterval(()=>{

document.title=
"Rest: "+remaining+"s";

remaining--;

if(remaining<0){

clearInterval(interval);

document.title=
"Workout Complete";

alert("Rest Time Over!");

}

},1000);

}

</script>

</body>
</html>
